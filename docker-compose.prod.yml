services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bgpmassa}
      POSTGRES_USER: ${POSTGRES_USER:-bgpmassa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bgpmassa} -d ${POSTGRES_DB:-bgpmassa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      APP_URL: ${APP_URL:-http://massa.bertuzzipatrimonial.com.br}
      DATABASE_URL: "postgresql://bgpmassa:bgpOITO9Sete%25%26%28%40NC@postgres:5432/bgpmassa"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://massa.bertuzzipatrimonial.com.br}
      ZAPI_WEBHOOK_SECRET: ${ZAPI_WEBHOOK_SECRET:-7f3a9c2e1d84b56f0a3c7e2d9b1f8a45c6e3d7b2f0a9c4e1b8d5f3a7c2e6d9b}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN:-F9c35f94e7b214d2a9905760c29fe2465S}
      ZAPI_INSTANCE_1_NAME: ${ZAPI_INSTANCE_1_NAME:-Operações}
      ZAPI_INSTANCE_1_ID: ${ZAPI_INSTANCE_1_ID:-3F0A83E9C1FF51FC1C2AA248D27FDCD6}
      ZAPI_INSTANCE_1_TOKEN: ${ZAPI_INSTANCE_1_TOKEN:-8FAEC264F0C52548F2C64C16}
      ZAPI_INSTANCE_2_NAME: ${ZAPI_INSTANCE_2_NAME}
      ZAPI_INSTANCE_2_ID: ${ZAPI_INSTANCE_2_ID}
      ZAPI_INSTANCE_2_TOKEN: ${ZAPI_INSTANCE_2_TOKEN}
      ZAPI_INSTANCE_3_NAME: ${ZAPI_INSTANCE_3_NAME}
      ZAPI_INSTANCE_3_ID: ${ZAPI_INSTANCE_3_ID}
      ZAPI_INSTANCE_3_TOKEN: ${ZAPI_INSTANCE_3_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
