services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: bgpmassa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/bgpmassa
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
      ZAPI_WEBHOOK_SECRET: ${ZAPI_WEBHOOK_SECRET}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN}
      ZAPI_INSTANCE_1_NAME: ${ZAPI_INSTANCE_1_NAME}
      ZAPI_INSTANCE_1_ID: ${ZAPI_INSTANCE_1_ID}
      ZAPI_INSTANCE_1_TOKEN: ${ZAPI_INSTANCE_1_TOKEN}
      ZAPI_INSTANCE_2_NAME: ${ZAPI_INSTANCE_2_NAME}
      ZAPI_INSTANCE_2_ID: ${ZAPI_INSTANCE_2_ID}
      ZAPI_INSTANCE_2_TOKEN: ${ZAPI_INSTANCE_2_TOKEN}
      ZAPI_INSTANCE_3_NAME: ${ZAPI_INSTANCE_3_NAME}
      ZAPI_INSTANCE_3_ID: ${ZAPI_INSTANCE_3_ID}
      ZAPI_INSTANCE_3_TOKEN: ${ZAPI_INSTANCE_3_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
